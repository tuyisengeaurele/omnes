version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: omnes_user
      POSTGRES_PASSWORD: change_this_password
      POSTGRES_DB: omnes_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U omnes_user -d omnes_db']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://omnes_user:change_this_password@postgres:5432/omnes_db
      NODE_ENV: production
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001/api
    ports:
      - '5173:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
